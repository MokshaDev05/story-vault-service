spring.application.name=story-vault-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:5434/storyvaultdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# File upload (50 MB max)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT
jwt.secret=c2VjcmV0S2V5Rm9yRGV2T25seS1DaGFuZ2VUaGlzSW5Qcm9kdWN0aW9uITEyMzQ1Njc4
jwt.expiration=2592000000

# App info
info.app.name=Story Vault Service
info.app.version=1.0.0
info.app.description=Private personal story archive
